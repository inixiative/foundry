services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: foundry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foundry
    ports:
      - "5532:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foundry"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foundry_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  muninndb:
    image: ghcr.io/scrypster/muninndb:latest
    container_name: foundry_muninndb
    restart: unless-stopped
    ports:
      - "8475:8475"  # REST API
      - "8476:8476"  # Web UI
    volumes:
      - muninndb_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8475/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  muninndb_data:
